<template id="tpl-tech-detector">
    <div class="h-full flex flex-col">
        <div class="flex items-center justify-between px-1 pb-2 mb-1 tech-header">
            <div>

                <p class="text-[9px] text-gray-400">شناسایی فریم‌ورک، کتابخانه و ابزارهای وب</p>
            </div>
            <button id="tech-detector-refresh"

        </div>

        <div id="tech-detector-results" class="flex-1 overflow-y-auto no-scrollbar">

                <div class="w-7 h-7 border-2 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-3"></div>
                <p class="text-xs text-gray-500">در حال اسکن صفحه...</p>
            </div>
        </div>
    </div>
</template>
