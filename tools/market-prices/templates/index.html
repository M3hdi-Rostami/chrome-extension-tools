<template id="tpl-market-prices">
    <div class="market-prices-root h-full flex flex-col min-h-0">
        <div class="flex items-center justify-between gap-2 market-header">
            <div>
                <p class="text-xs text-gray-400">آخرین بروزرسانی</p>
                <p id="market-last-update" class="text-sm font-medium text-gray-600">—</p>
            </div>
            <button id="market-refresh-btn" type="button" title="بروزرسانی"
                class="market-header-refresh flex items-center justify-center text-white rounded-full transition-colors"
                aria-label="بروزرسانی">
                <svg id="market-refresh-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </div>

        <p id="market-current-datetime" class="text-xs text-center font-medium tabular-nums"
            style="color: var(--mp-muted-2, #6b778c);">—</p>

        <div id="market-view-prices" class="market-view flex flex-col flex-1 min-h-0 gap-2">
            <div id="market-loading" class="hidden flex-1 flex flex-col items-center justify-center gap-3">
                <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                <span class="text-sm text-gray-500">در حال دریافت قیمت‌ها...</span>
            </div>

            <div id="market-error" class="hidden flex-1 flex flex-col items-center justify-center gap-3 text-center p-4">
                <div class="bg-red-100 text-red-600 p-3 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <p id="market-error-msg" class="text-sm text-gray-600">خطا در دریافت اطلاعات</p>
                <button id="market-retry-btn"
                    class="text-sm text-indigo-600 hover:text-indigo-500 font-medium">تلاش مجدد</button>
            </div>

            <div id="market-prices-list" class="price-cards-grid flex-1 overflow-y-auto no-scrollbar market-scroll-area">
            </div>
        </div>

        <div id="market-view-cars" class="market-view hidden flex flex-col flex-1 min-h-0 gap-2">
            <div class="cars-search-wrap">
                <input id="cars-search" type="search" inputmode="search" autocomplete="off"
                    placeholder="جستجو برند یا مدل..." class="cars-search-input" />
            </div>

            <div id="cars-loading" class="hidden flex-1 flex flex-col items-center justify-center gap-3">
                <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                <span class="text-sm text-gray-500">در حال دریافت قیمت خودرو...</span>
            </div>

            <div id="cars-error" class="hidden flex-1 flex flex-col items-center justify-center gap-3 text-center p-4">
                <div class="bg-red-100 text-red-600 p-3 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <p id="cars-error-msg" class="text-sm text-gray-600">خطا در دریافت اطلاعات</p>
                <button id="cars-retry-btn"
                    class="text-sm text-indigo-600 hover:text-indigo-500 font-medium">تلاش مجدد</button>
            </div>

            <div id="cars-list-wrap" class="cars-list-wrap hidden flex-1 min-h-0 market-scroll-area">
                <div id="cars-list" class="cars-list"></div>
            </div>
        </div>

        <nav class="market-bottom-nav" aria-label="منوی قیمت‌ها">
            <button type="button" class="market-nav-btn is-active" data-market-tab="prices">
                <svg class="market-nav-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="market-nav-label">طلا و ارز</span>
            </button>

            <div class="market-nav-fab-wrap">
                <button type="button" id="market-nav-refresh" class="market-nav-fab" aria-label="بروزرسانی قیمت‌ها" title="بروزرسانی">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>

            <button type="button" class="market-nav-btn" data-market-tab="cars">
                <svg class="market-nav-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                        d="M8 17h.01M16 17h.01M3 13l1.5-4.5A2 2 0 016.4 7h11.2a2 2 0 011.9 1.5L21 13m-18 0h18m-18 0v4a1 1 0 001 1h1a1 1 0 001-1v-1h12v1a1 1 0 001 1h1a1 1 0 001-1v-4" />
                </svg>
                <span class="market-nav-label">خودرو</span>
            </button>
        </nav>
    </div>
</template>
