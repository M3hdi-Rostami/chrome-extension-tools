<template id="tpl-api-tester">
    <div class="h-full flex flex-col gap-2 text-sm">

        <!-- Saved requests bar -->
        <div class="flex items-center gap-2">
            <select id="api-saved-select"
                class="flex-1 min-w-0 bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-300">
                <option value="">— درخواست جدید —</option>
            </select>
            <button id="api-save-btn" title="ذخیره"
                class="shrink-0 bg-indigo-600 hover:bg-indigo-500 text-white p-1.5 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                </svg>
            </button>
            <button id="api-delete-btn" title="حذف"
                class="shrink-0 bg-red-50 hover:bg-red-100 text-red-600 p-1.5 rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>

        <!-- Name (shown when saving or editing) -->
        <div>
            <input id="api-name-input" type="text" placeholder="نام درخواست (برای ذخیره)"
                class="w-full bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-300" />
            <p id="api-save-hint" class="hidden text-[10px] text-red-500 mt-1"></p>
        </div>

        <!-- Method + URL -->
        <div class="flex gap-2 api-method-row">
            <select id="api-method"
                class="w-24 shrink-0 bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-indigo-300">
                <option value="GET">GET</option>
                <option value="POST">POST</option>
                <option value="PUT">PUT</option>
                <option value="PATCH">PATCH</option>
                <option value="DELETE">DELETE</option>
                <option value="HEAD">HEAD</option>
                <option value="OPTIONS">OPTIONS</option>
            </select>
            <input id="api-url" type="text" dir="ltr" placeholder="https://api.example.com/endpoint"
                class="flex-1 min-w-0 bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-300" />
        </div>

        <!-- Tabs: Request Headers / Body -->
        <div class="flex gap-1 border-b border-gray-200">
            <button data-tab="req-headers" class="api-req-tab active px-3 py-1 text-xs font-medium text-indigo-600 border-b-2 border-indigo-600">هدرها</button>
            <button data-tab="req-body" class="api-req-tab px-3 py-1 text-xs font-medium text-gray-500 border-b-2 border-transparent">بدنه</button>
        </div>

        <!-- Headers panel -->
        <div id="api-panel-headers" class="space-y-1.5">
            <div id="api-headers-list" class="space-y-1.5 max-h-24 overflow-y-auto no-scrollbar"></div>
            <button id="api-add-header"
                class="text-xs text-indigo-600 hover:text-indigo-500 font-medium flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                </svg>
                افزودن هدر
            </button>
        </div>

        <!-- Body panel -->
        <div id="api-panel-body" class="hidden">
            <select id="api-body-type"
                class="w-full mb-1.5 bg-white border border-gray-200 rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-300">
                <option value="json">JSON</option>
                <option value="text">متن ساده</option>
                <option value="form">Form URL Encoded</option>
            </select>
            <textarea id="api-body" dir="ltr" rows="4" placeholder='{"key": "value"}'
                class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none"></textarea>
        </div>

        <!-- Send -->
        <button id="api-send-btn"
            class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-indigo-300 text-white font-bold py-2 rounded-lg transition-colors flex items-center justify-center gap-2">
            <svg id="api-send-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            <span id="api-send-text">ارسال درخواست</span>
        </button>

        <!-- Response -->
        <div class="flex-1 min-h-0 flex flex-col border border-gray-200 rounded-lg bg-white overflow-hidden">
            <div class="flex items-center justify-between px-3 py-1.5 bg-gray-50 border-b border-gray-200 shrink-0">
                <span class="text-xs font-bold text-gray-600">پاسخ</span>
                <div class="flex items-center gap-2">
                    <span id="api-res-status" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-gray-200 text-gray-500 hidden"></span>
                    <span id="api-res-time" class="text-[10px] text-gray-400 hidden"></span>
                    <button id="api-copy-response" title="کپی"
                        class="text-gray-400 hover:text-indigo-600 transition-colors hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="flex gap-1 border-b border-gray-200 px-2 shrink-0">
                <button data-tab="res-body" class="api-res-tab active px-2 py-1 text-[10px] font-medium text-indigo-600 border-b-2 border-indigo-600">بدنه</button>
                <button data-tab="res-headers" class="api-res-tab px-2 py-1 text-[10px] font-medium text-gray-500 border-b-2 border-transparent">هدرها</button>
            </div>
            <pre id="api-response-body" dir="ltr"
                class="flex-1 overflow-auto no-scrollbar p-3 text-[10px] font-mono text-gray-700 whitespace-pre-wrap break-all m-0">پاسخی دریافت نشده</pre>
            <pre id="api-response-headers" dir="ltr"
                class="hidden flex-1 overflow-auto no-scrollbar p-3 text-[10px] font-mono text-gray-700 whitespace-pre-wrap break-all m-0">هدر پاسخی دریافت نشده</pre>
        </div>
    </div>
</template>
