    let snoozedLatestVersion = null;
    let snoozeUntil = 0;
    let audioCtx = null;
    const UPDATE_SUCCESS_SOUND_KEY = "market-prices-play-update-success";

    function getAudioContext() {
      try {
        if (!audioCtx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) return null;
          audioCtx = new Ctx();
        }
        if (audioCtx.state === "suspended") audioCtx.resume().catch(function () {});
        return audioCtx;
      } catch {
        return null;
      }
    }

    function playNotificationTone(sequence) {
      const ctx = getAudioContext();
      if (!ctx) return;
      const master = ctx.createGain();
      master.gain.value = 0.18;
      master.connect(ctx.destination);
      let t = ctx.currentTime + 0.02;
      sequence.forEach(function (note) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = note.type || "sine";
        osc.frequency.value = note.freq;
        osc.connect(gain);
        gain.connect(master);
        const dur = note.dur || 0.14;
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.85, t + 0.006);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.start(t);
        osc.stop(t + dur + 0.03);
        t += note.gap != null ? note.gap : dur * 0.62;
      });
    }

    function playUpdateAvailableSound() {
      playNotificationTone([
        { freq: 880, dur: 0.1, gap: 0.08, type: "sine" },
        { freq: 1174.66, dur: 0.14, gap: 0.06, type: "sine" },
        { freq: 1567.98, dur: 0.18, type: "triangle" },
      ]);
    }

    function playUpdateCompleteSound() {
      playNotificationTone([
        { freq: 523.25, dur: 0.08, gap: 0.06, type: "sine" },
        { freq: 659.25, dur: 0.08, gap: 0.06, type: "sine" },
        { freq: 783.99, dur: 0.1, gap: 0.06, type: "triangle" },
        { freq: 1046.5, dur: 0.2, type: "sine" },
      ]);
    }

    function markUpdateSuccessSound() {
      try { sessionStorage.setItem(UPDATE_SUCCESS_SOUND_KEY, "1"); } catch {}
    }

    function playUpdateSuccessSoundIfPending() {
      try {
        if (sessionStorage.getItem(UPDATE_SUCCESS_SOUND_KEY) !== "1") return;
        sessionStorage.removeItem(UPDATE_SUCCESS_SOUND_KEY);
      } catch {
        return;
      }
      window.setTimeout(playUpdateCompleteSound, 350);
    }

    function initAppUpdater() {
      if (typeof AndroidApp === "undefined") {
        const section = document.getElementById("appUpdateSection");
        if (section) section.style.display = "none";
        return;
      }
      const versionEl = document.getElementById("appContentVersion");
      const statusEl = document.getElementById("appUpdateStatus");
      const btn = document.getElementById("appUpdateBtn");
      if (!versionEl || !statusEl || !btn || typeof APP_UPDATE_CONFIG === "undefined") return;
      versionEl.textContent = AndroidApp.getContentVersion();
      window.__onAppUpdateComplete = function (result) {
        btn.disabled = false;
        statusEl.className = "app-update-status" + (result.success ? " success" : " error");
        statusEl.textContent = result.message || "";
        if (result.latestVersion) versionEl.textContent = result.latestVersion;
        if (result.success && result.reloaded) {
          markUpdateSuccessSound();
          playUpdateCompleteSound();
        }
      };
      btn.addEventListener("click", function () {
        btn.disabled = true;
        statusEl.className = "app-update-status";
        statusEl.textContent = "در حال دریافت آخرین نسخه برنامه از گیت‌هاب...";
        AndroidApp.startAppUpdate(APP_UPDATE_CONFIG.repoOwner, APP_UPDATE_CONFIG.repoName, APP_UPDATE_CONFIG.branch);
      });
    }

    function initUpdatePrompt() {
      if (typeof AndroidApp === "undefined" || typeof APP_UPDATE_CONFIG === "undefined") return;

      const overlay = document.getElementById("updateSheetOverlay");
      const backdrop = document.getElementById("updateSheetBackdrop");
      const messageEl = document.getElementById("updateSheetMessage");
      const dismissBtn = document.getElementById("updateSheetDismissBtn");
      const confirmBtn = document.getElementById("updateSheetConfirmBtn");
      const updateBtn = document.getElementById("appUpdateBtn");
      if (!overlay || !messageEl || !dismissBtn || !confirmBtn) return;

      let pendingLatestVersion = "";

      function notifySheetOpen(open) {
        try {
          AndroidApp.setUpdateSheetOpen(open);
        } catch {}
      }

      function hideUpdateSheet() {
        overlay.classList.remove("open");
        notifySheetOpen(false);
        overlay.setAttribute("aria-hidden", "true");
        window.setTimeout(function () {
          if (!overlay.classList.contains("open")) overlay.classList.add("hidden");
        }, 350);
      }

      function showUpdateSheet(latestVersion, currentVersion) {
        if (snoozedLatestVersion === latestVersion && Date.now() < snoozeUntil) return;
        if (overlay.classList.contains("open")) return;

        pendingLatestVersion = latestVersion;
        overlay.dataset.latestVersion = latestVersion;
        messageEl.textContent = "نسخه " + latestVersion + " منتشر شده است. نسخه فعلی شما " + currentVersion + " است.";
        overlay.classList.remove("hidden");
        requestAnimationFrame(function () {
          overlay.classList.add("open");
          notifySheetOpen(true);
          overlay.setAttribute("aria-hidden", "false");
          playUpdateAvailableSound();
        });
      }

      window.__onAppUpdateCheckComplete = function (result) {
        if (!result || !result.success || !result.hasUpdate) return;
        showUpdateSheet(result.latestVersion, result.currentVersion);
      };

      dismissBtn.addEventListener("click", function () {
        if (pendingLatestVersion) {
          snoozedLatestVersion = pendingLatestVersion;
          snoozeUntil = Date.now() + UPDATE_CHECK_INTERVAL_MS;
        }
        hideUpdateSheet();
      });

      if (backdrop) {
        backdrop.addEventListener("click", function () { dismissBtn.click(); });
      }

      confirmBtn.addEventListener("click", function () {
        hideUpdateSheet();
        if (updateBtn && !updateBtn.disabled) updateBtn.click();
        else {
          try {
            AndroidApp.startAppUpdate(APP_UPDATE_CONFIG.repoOwner, APP_UPDATE_CONFIG.repoName, APP_UPDATE_CONFIG.branch);
          } catch {}
        }
      });

      function runUpdateCheck() {
        try {
          AndroidApp.checkForAppUpdate(APP_UPDATE_CONFIG.repoOwner, APP_UPDATE_CONFIG.repoName, APP_UPDATE_CONFIG.branch);
        } catch {}
      }

      window.setTimeout(runUpdateCheck, 12000);
      window.setInterval(runUpdateCheck, UPDATE_CHECK_INTERVAL_MS);
    }

    try { localStorage.removeItem("market-prices-update-dismissed"); } catch {}

    playUpdateSuccessSoundIfPending();

    initAppUpdater();
    initUpdatePrompt();
  })();
  </script>
</body></html>
